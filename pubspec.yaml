name: flutter_hot_line
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  font_awesome_flutter: ^10.12.0
  url_launcher: ^6.3.2
  introduction_screen: ^4.0.0
  cupertino_icons: ^1.0.8
  carousel_slider: ^5.1.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  icons_launcher: ^3.0.3
  flutter_launcher_icons: ^0.14.4

icons_launcher:
  image_path: "assets/icon/icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
